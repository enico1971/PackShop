<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5FBF8A"/>
      <stop offset="1" stop-color="#3FA7E0"/>
    </linearGradient>
    <linearGradient id="gSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6FC998"/>
      <stop offset="1" stop-color="#52B2E6"/>
    </linearGradient>
  </defs>

  <!-- abgerundete App-Kachel -->
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#g)"/>

  <!-- weiche Taschen-/Beutelform (abstrakt, freundlich) -->
  <path d="M150 196
           a106 106 0 0 1 212 0
           v8
           a40 40 0 0 1 34 39
           l16 150
           a52 52 0 0 1 -52 58
           H152
           a52 52 0 0 1 -52 -58
           l16 -150
           a40 40 0 0 1 34 -39
           z"
        fill="#FFFFFF"/>

  <!-- Henkel-Andeutung (Bogen oben) -->
  <path d="M186 200 a70 70 0 0 1 140 0"
        fill="none" stroke="#FFFFFF" stroke-width="26" stroke-linecap="round" opacity="0.0"/>

  <!-- großer, runder Haken = 'erledigt & bereit', im Farbverlauf -->
  <path d="M196 300
           l40 44
           l84 -96"
        fill="none" stroke="url(#gSoft)" stroke-width="34"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
