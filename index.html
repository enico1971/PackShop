<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Pack & Shop" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#5FBF8A" />
<meta name="description" content="Pack & Shop – gemeinsame Einkaufs- und Packlisten für Paare und Familien." />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<title>Pack &amp; Shop</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Nunito+Sans:wght@400;600;700;800&display=swap');
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { overflow-x: hidden; max-width: 100%; }
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px 12px; font-family: 'Nunito Sans', sans-serif;
    background: radial-gradient(120% 80% at 50% 0%, #FBFEFC 0%, #EDF3F2 55%, #E3ECEA 100%); }
  .phone { width: 380px; max-width: 100%; height: 760px; border-radius: 44px; background: #0d1414;
    padding: 12px; box-shadow: 0 40px 80px -20px rgba(40,60,55,.45); position: relative; }
  .screen { --bg:#F7F9F8; --card:#FFFFFF; --ink:#2E3A3F; --inkSoft:#9AA6AB;
    width: 100%; height: 100%; border-radius: 34px; overflow: hidden; background: #EAF7EF;
    transition: background .4s ease; display: flex; flex-direction: column; position: relative; }
  .notch-wrap { display: flex; justify-content: center; padding-top: 10px; }
  .notch { width: 120px; height: 26px; background: #0d1414; border-radius: 20px; }

  /* Auf echten Handys (schmale Bildschirme) und als installierte App:
     kein Fake-Rahmen, App füllt den ganzen Bildschirm. */
  @media (max-width: 500px) {
    body { padding: 0; align-items: stretch; background: #EAF7EF; }
    .phone { width: 100%; max-width: 100%; height: 100vh; height: 100dvh;
      border-radius: 0; padding: 0; box-shadow: none; background: transparent; }
    .screen { border-radius: 0; }
    .notch-wrap { display: none; }
    /* iPhone-Notch / Home-Indikator aussparen */
    .header { padding-top: calc(12px + env(safe-area-inset-top)); }
    .addbar { padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
  }
  /* Als installierte PWA (Standalone) immer Vollbild, auch auf größeren Screens */
  @media (display-mode: standalone) {
    body { padding: 0; align-items: stretch; background: #EAF7EF; }
    .phone { width: 100%; max-width: 100%; height: 100vh; height: 100dvh;
      border-radius: 0; padding: 0; box-shadow: none; background: transparent; }
    .screen { border-radius: 0; }
    .notch-wrap { display: none; }
    .header { padding-top: calc(12px + env(safe-area-inset-top)); }
    .addbar { padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
  }
  .header { padding: 12px 16px 6px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .header > div:first-child { min-width: 0; flex: 1; }
  .hello { font-size: 10px; letter-spacing: 2px; color: var(--inkSoft); font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .brand { font-family: 'Fraunces', serif; font-size: 21px; font-weight: 600; color: var(--ink); line-height: 1.05; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .icons { flex: 0 0 auto; }
  .icons { display: flex; gap: 7px; }
  .icon-btn { position: relative; width: 44px; height: 44px; border-radius: 14px; border: none; background: var(--card);
    display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 21px;
    box-shadow: 0 4px 12px -6px rgba(40,60,55,.3); }
  .lang-btn { width: auto; padding: 0 9px; font-weight: 800; font-size: 12px; color: var(--ink); }
  .dot { position: absolute; top: 4px; right: 4px; width: 8px; height: 8px; border-radius: 8px; background: #E8705B; display: none; }
  .tabs { display: flex; gap: 7px; padding: 8px 16px 14px; }
  .tab { flex: 1; border: none; cursor: pointer; border-radius: 16px; padding: 15px 0; font-family: inherit;
    font-weight: 800; font-size: 13px; letter-spacing: .3px; transition: all .25s ease; background: var(--card); color: var(--inkSoft); white-space: nowrap; }
  .tab.active-shop { background: #5FBF8A; color: #fff; box-shadow: 0 8px 20px -8px #5FBF8A; }
  .tab.active-pack { background: #3FA7E0; color: #fff; box-shadow: 0 8px 20px -8px #3FA7E0; }
  .tab.active-todo { background: #E8A33D; color: #fff; box-shadow: 0 8px 20px -8px #E8A33D; }
  .list { flex: 1; background: var(--bg); border-top-left-radius: 28px; border-top-right-radius: 28px;
    overflow-y: auto; padding: 20px 16px 96px; }
  .list::-webkit-scrollbar { width: 0; }
  .group { margin-bottom: 14px; border-radius: 20px; padding: 14px 12px 6px; border:1px solid rgba(0,0,0,.06); box-shadow:0 2px 10px -8px rgba(40,60,55,.5); }
  .cat-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding-left: 4px; }
  .cat-name { font-size: 12.5px; letter-spacing: 1px; font-weight: 800; color: var(--ink); text-transform: uppercase; }
  .row { display: flex; align-items: center; gap: 10px; background: var(--card); border-radius: 14px; padding: 12px;
    margin-bottom: 8px; box-shadow: 0 2px 8px -6px rgba(40,60,55,.35); animation: rise .3s ease both; }
  .emoji { font-size: 18px; width: 24px; text-align: center; flex: 0 0 auto; }
  .check { width: 23px; height: 23px; border-radius: 12px; border: 2.5px solid var(--accent); background: transparent;
    display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .2s ease; flex: 0 0 auto; color:#fff; font-size:13px; }
  .check.on { background: var(--accent); border-color: var(--accent); }
  .name { flex: 1; min-width: 0; color: var(--ink); font-weight: 600; overflow-wrap: anywhere; }
  .name.done { color: var(--inkSoft); text-decoration: line-through; }
  .mini { border: none; background: rgba(140,150,150,.12); border-radius:9px; cursor: pointer; padding: 5px 6px; display: flex; flex: 0 0 auto; font-size:15px; }
  .empty { text-align: center; color: var(--inkSoft); margin-top: 80px; font-size: 15px; }
  .addbar { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 16px 22px;
    background: linear-gradient(0deg, var(--bg) 72%, rgba(0,0,0,0)); display: flex; gap: 8px; align-items: center; }
  .addbar input { flex: 1; border: none; outline: none; background: var(--card); border-radius: 16px; padding: 14px 16px;
    font-size: 15px; color: var(--ink); font-family: inherit; box-shadow: 0 4px 16px -8px rgba(40,60,55,.25); }
  .round { width: 50px; height: 50px; border-radius: 25px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex: 0 0 auto; }
  .cat-btn { background: var(--card); font-size: 19px; color: var(--ink); box-shadow: 0 4px 14px -8px rgba(40,60,55,.4); }
  .add { background: var(--accent); color: #fff; font-size: 24px; box-shadow: 0 8px 20px -8px var(--accent); }
  .overlay { position: absolute; inset: 0; background: rgba(10,16,15,.42); display: none; align-items: center;
    justify-content: center; padding: 20px; z-index: 30; }
  .overlay.show { display: flex; }
  .sheet { width: 100%; max-height: 88%; overflow-y: auto; background: var(--card); border-radius: 24px; padding: 22px;
    box-shadow: 0 24px 50px -16px rgba(0,0,0,.4); animation: drop .35s cubic-bezier(.2,.9,.3,1) both; }
  .sheet::-webkit-scrollbar { width: 0; }
  .sheet h3 { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; color: var(--ink); margin: 0 0 6px; }
  .sheet p { color: var(--inkSoft); font-size: 14px; margin: 0 0 16px; }
  .code { font-family: 'Fraunces', serif; font-size: 34px; letter-spacing: 6px; font-weight: 700; text-align: center;
    color: #6FBF92; background: rgba(111,191,146,.15); border-radius: 16px; padding: 16px 0; margin-bottom: 18px; }
  .reset { width: 100%; border: 1px solid rgba(150,160,160,.3); background: transparent; color: var(--inkSoft); border-radius: 14px; padding: 12px 0;
    font-family: inherit; font-weight: 700; cursor: pointer; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .chip { border: 1px solid rgba(150,160,160,.25); background: var(--bg); color: var(--ink); border-radius: 20px; padding: 8px 13px;
    font-family: inherit; font-weight: 600; font-size: 14px; cursor: pointer; transition: all .15s ease; }
  .chip.on { background: var(--accent); color: #fff; border-color: transparent; }
  .day-head { font-size: 12px; letter-spacing: 1px; font-weight: 800; color: var(--inkSoft); text-transform: uppercase; margin: 14px 0 8px; }
  .hist-row { display: flex; align-items: center; gap: 10px; background: var(--bg); border-radius: 12px; padding: 10px 12px; margin-bottom: 6px; }
  .push-wrap { position: absolute; inset: 0; background: rgba(10,16,15,.3); display: none; justify-content: center;
    align-items: flex-start; padding: 16px; z-index: 30; }
  .push-wrap.show { display: flex; }
  .push { margin-top: 24px; width: 100%; background: var(--card); border-radius: 22px;
    padding: 16px; box-shadow: 0 20px 40px -12px rgba(0,0,0,.35); animation: drop .35s cubic-bezier(.2,.9,.3,1) both; }
  .push-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .push-badge { width: 26px; height: 26px; border-radius: 8px; background: #6FBF92; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; }
  .push-item { display: flex; align-items: center; gap: 10px; padding: 8px 4px; cursor: pointer; }
  .push-box { width: 22px; height: 22px; border-radius: 7px; border: 2px solid #6FBF92; display: flex; align-items: center; justify-content: center; color: #6FBF92; font-weight: 800; }
  .hint { font-size: 11px; color: var(--inkSoft); margin-top: 8px; text-align: center; }
  @keyframes rise { from { opacity:0; transform: translateY(8px);} to { opacity:1; transform:none; } }
  @keyframes drop { from { opacity:0; transform: translateY(-16px);} to { opacity:1; transform:none; } }
  .tap:active { transform: scale(.95); }
  .icons{ gap:7px; } .icon-btn{ width:44px; height:44px; border-radius:14px; font-size:21px; } .lang-btn{ width:auto; padding:0 11px; font-size:13px; } .brand{ font-size:19px; }
  .tiles{ display:flex; flex-wrap:wrap; gap:14px 12px; padding:2px 2px 0; }
  .tile{ width:calc(33.333% - 8px); background:var(--card); border-radius:18px; padding:20px 6px 16px; text-align:center; cursor:pointer; box-shadow:0 3px 12px -7px rgba(40,60,55,.4); position:relative; animation:rise .3s ease both; }
  .tile.done{ opacity:.5; } .tile.done .tn{ text-decoration:line-through; }
  .tile .te{ font-size:30px; } .tile .tn{ font-size:12px; color:var(--ink); font-weight:700; margin-top:6px; line-height:1.2; word-break:break-word; }
  .tile .tq{ position:absolute; bottom:4px; right:5px; font-size:9px; font-weight:800; color:var(--inkSoft); }
  .tile .tcheck{ position:absolute; top:-8px; left:-8px; width:26px; height:26px; border-radius:50%; border:3px solid #fff; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; color:#fff; z-index:3; box-shadow:0 2px 7px -2px rgba(40,60,55,.55); }
  .tile .tdot{ position:absolute; top:6px; right:6px; width:13px; height:13px; border-radius:50%; box-shadow:0 0 0 2px var(--card); }
  .catplus{ margin-left:auto; border:none; background:var(--accent); cursor:pointer; width:26px; height:26px; border-radius:50%; padding:5px; line-height:1; display:flex; align-items:center; justify-content:center; box-shadow:0 3px 8px -4px var(--accent); }
  .catplus.x{ background:transparent; color:var(--inkSoft); font-size:13px; box-shadow:none; width:auto; height:auto; padding:0 2px; }
  .who{ flex:0 0 auto; width:24px; height:24px; border-radius:50%; border:none; cursor:pointer; font-size:11px; font-weight:800; color:#fff; display:flex; align-items:center; justify-content:center; padding:0; }
  .who.none{ background:var(--inkSoft); color:#fff; border:none; opacity:.85; }
  .whomenu{ position:fixed; z-index:60; background:var(--card); border-radius:16px; box-shadow:0 12px 40px -8px rgba(0,0,0,.55); padding:8px; display:flex; flex-direction:column; gap:6px; min-width:180px; border:2px solid var(--accent); }
  .whomenu .wtitle{ font-size:11px; font-weight:800; letter-spacing:.5px; text-transform:uppercase; color:var(--inkSoft); padding:2px 6px 4px; }
  .whomenu button{ display:flex; align-items:center; gap:10px; cursor:pointer; padding:11px 12px; border-radius:12px; font-family:inherit; font-size:15px; font-weight:700; color:var(--ink); text-align:left; width:100%; border:2px solid transparent; background:var(--bg); }
  .whomenu .wdot{ width:26px; height:26px; border-radius:50%; flex:0 0 auto; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:12px; box-shadow:0 0 0 2px rgba(255,255,255,.6); }
  .more-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .more-cell{ display:flex; flex-direction:column; align-items:center; gap:6px; background:var(--bg); border:none; border-radius:14px; padding:16px 8px; cursor:pointer; font-family:inherit; }
  .more-cell .mc-ic{ font-size:22px; }
  .more-cell .mc-tx{ font-size:12.5px; font-weight:700; color:var(--ink); }
  .whobackdrop{ position:fixed; inset:0; z-index:59; background:rgba(15,22,22,.55); backdrop-filter:blur(2px); }
  .rowmore{ flex:0 0 auto; border:none; background:rgba(140,150,150,.12); border-radius:9px; cursor:pointer; padding:5px 7px; font-size:16px; color:var(--inkSoft); line-height:1; }
  /* Mengen-Regler (−/+) für SHOP & PACK */
  .qty{ flex:0 0 auto; display:flex; align-items:center; gap:2px; background:rgba(140,150,150,.10); border-radius:10px; padding:2px; }
  .qbtn{ border:none; background:var(--card); width:24px; height:24px; border-radius:8px; cursor:pointer; font-size:15px; font-weight:800; color:var(--accent); line-height:1; display:flex; align-items:center; justify-content:center; box-shadow:0 1px 4px -2px rgba(40,60,55,.3); font-family:inherit; }
  .qbtn:active{ transform:scale(.9); }
  .qval{ min-width:18px; text-align:center; font-size:13px; font-weight:800; color:var(--ink); }
  /* Sanftes Aufleuchten, wenn der Partner per Live-Sync etwas ändert */
  @keyframes rowflash { 0%{ box-shadow:0 0 0 3px rgba(95,191,138,.65); } 100%{ box-shadow:0 0 0 0 rgba(95,191,138,0); } }
  .row.flash, .tile.flash { animation: rowflash 1.6s ease-out; }
  .actmenu{ position:fixed; z-index:60; background:var(--card); border-radius:16px; box-shadow:0 12px 40px -8px rgba(0,0,0,.5); padding:7px; display:flex; flex-direction:column; gap:3px; min-width:190px; border:1.5px solid rgba(140,150,150,.25); }
  .actmenu button{ display:flex; align-items:center; gap:11px; border:none; background:transparent; cursor:pointer; padding:12px 12px; border-radius:11px; font-family:inherit; font-size:15px; font-weight:600; color:var(--ink); text-align:left; width:100%; }
  .actmenu button .ai{ font-size:16px; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex:0 0 auto; color:#fff; }
  .actmenu button.on{ font-weight:800; }
  .actmenu button.danger{ color:#D8524D; }
  .tile .twho{ position:absolute; top:3px; right:5px; width:18px; height:18px; border-radius:50%; border:none; font-size:9px; font-weight:800; color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0; }
  .tile .twho.none{ background:var(--inkSoft); color:#fff; border:none; opacity:.85; }
  .emojigrid{ display:flex; flex-wrap:wrap; gap:6px; }
  .emojibtn{ width:44px; height:44px; border:none; background:var(--bg); border-radius:12px; font-size:22px; cursor:pointer; }
  .backbtn{ position:absolute; top:14px; right:14px; width:32px; height:32px; border:none; background:var(--bg); border-radius:10px; font-size:15px; color:var(--ink); cursor:pointer; z-index:2; }
  .sheet{ position:relative; }
  .listfoot{ display:flex; gap:8px; margin-top:6px; }
  .footbtn{ flex:1; border:1px solid rgba(150,160,160,.3); background:transparent; color:var(--inkSoft); border-radius:13px; padding:11px 0; font-family:inherit; font-weight:700; font-size:13px; cursor:pointer; }
  .sharebox{ width:100%; min-height:200px; border:none; background:var(--bg); border-radius:14px; padding:14px; font-family:inherit; font-size:14px; color:var(--ink); resize:none; outline:none; box-sizing:border-box; }
</style>
</head>
<body>
<div class="phone"><div class="screen" id="screen">
  <div class="notch-wrap"><div class="notch"></div></div>
  <div class="header">
    <div><div class="hello" id="hello">BENTORNATI</div><div class="brand">Pack &amp; Shop</div></div>
    <div class="icons">
      <button class="icon-btn tap" id="viewBtn">▦</button>
      <button class="icon-btn tap" id="bellBtn">🔔<span class="dot" id="bellDot"></span></button>
      <button class="icon-btn tap" id="usersBtn">👥<span class="dot" id="syncDot" style="background:#6FBF92;display:none;"></span></button>
      <button class="icon-btn tap" id="moreBtn">⋯</button>
    </div>
  </div>
  <div class="overlay" id="moremenu"><div class="sheet">
    <button class="backbtn tap" data-close="moremenu">✕</button>
    <h3 id="moreTitle">Mehr</h3>
    <div class="more-grid" id="moreGrid"></div>
  </div></div>
  <div class="tabs">
    <button class="tab tap" id="tabShop">🛒  SHOP</button>
    <button class="tab tap" id="tabPack">🧳  PACK</button>
    <button class="tab tap" id="tabTodo">🏠  TODO</button>
  </div>
  <div class="list" id="list"></div>
  <div class="addbar">
    <button class="round cat-btn tap" id="suggestBtn">📋</button>
    <input id="input" placeholder="Aggiungi…" />
    <button class="round add tap" id="addBtn" aria-label="+"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 4.2V17.8M4.2 11H17.8" stroke="#fff" stroke-width="2.8" stroke-linecap="round"/></svg></button>
  </div>

  <div class="overlay" id="invite"><div class="sheet">
    <button class="backbtn tap" data-close="invite">✕</button>
    <div id="connectBody"></div>
    <button class="reset tap" id="resetBtn" style="margin-top:14px;display:none;">Reset</button>
  </div></div>
  <div class="overlay" id="suggest"><div class="sheet">
    <button class="backbtn tap" data-close="suggest">✕</button>
    <h3 id="suggestTitle">Prodotti</h3><p id="suggestDesc">.</p><div id="suggestList"></div>
  </div></div>
  <div class="overlay" id="generate"><div class="sheet"><button class="backbtn tap" data-close="generate">✕</button><div id="genBody"></div></div></div>
  <div class="overlay" id="emojipick"><div class="sheet"><button class="backbtn tap" data-close="emojipick">✕</button><h3 id="emojiTitle">Emoji</h3><div class="emojigrid" id="emojigrid"></div></div></div>
  <div class="overlay" id="history"><div class="sheet">
    <button class="backbtn tap" data-close="history">✕</button>
    <h3 id="historyTitle">Ultimi acquisti</h3><p id="historyDesc">.</p><div id="historyList"></div>
  </div></div>
  <div class="overlay" id="share"><div class="sheet">
    <button class="backbtn tap" data-close="share">✕</button>
    <h3 id="shareTitle">Condividi</h3><p id="shareDesc">.</p>
    <textarea class="sharebox" id="sharebox" readonly></textarea>
    <button class="reset tap" id="copyBtn" style="margin-top:10px;color:#fff;background:var(--accent);border:none;">📋 Copia</button>
  </div></div>
  <div class="push-wrap" id="push"><div class="push">
    <div class="push-top"><div class="push-badge">⚡</div>
      <div style="font-weight:800;color:var(--ink);font-size:14px;flex:1;">Pack &amp; Shop · <span id="pushNow">ora</span></div>
      <button class="mini" id="pushClose" style="color:var(--inkSoft);">✕</button></div>
    <div style="font-weight:700;color:var(--ink);margin-bottom:10px;font-size:15px;" id="pushAsk">.</div>
    <div id="pushList"></div><div class="hint" id="pushHint">.</div>
  </div></div>
  <div class="overlay" id="onboard"><div class="sheet" style="text-align:center;">
    <img src="icon-192.png" alt="Pack & Shop" style="width:84px;height:84px;border-radius:22px;margin:6px auto 10px;display:block;box-shadow:0 8px 22px -10px rgba(40,60,55,.5);" />
    <h3 id="obWelcome" style="font-family:'Fraunces',serif;font-size:24px;margin:0 0 4px;">Welcome</h3>
    <div id="obSub" style="color:var(--inkSoft);font-size:14px;margin-bottom:18px;">.</div>
    <div id="obList" style="text-align:left;"></div>
    <div id="obTestBanner" style="font-size:11px;color:var(--inkSoft);background:rgba(234,179,8,.14);border:1px solid #EAB308;border-radius:10px;padding:8px 10px;margin:4px 0 10px;">.</div>
    <button class="tap" id="obStartBtn" style="width:100%;border:none;background:var(--accent);color:#fff;border-radius:14px;padding:15px 0;font-family:inherit;font-weight:800;font-size:16px;cursor:pointer;margin-top:8px;">.</button>
  </div></div>
</div></div>

<script>
  /* =======================================================================
     ====   👉👉👉  HIER DEINE 2 SUPABASE-WERTE EINTRAGEN  👈👈👈   ====
     =======================================================================
     - Ersetze nur den Text ZWISCHEN den Anführungszeichen "".

  function addPackObj(o){ if(inPack(o)) return; const cat=o.category||(o.pid&&PRODUCTS[o.pid]?PRODUCTS[o.pid].cat:categorize(o.name||"","PACK")); state.items.push({id:uid(),area:"PACK",tripId:state.activeTrip,category:cat,pid:o.pid||null,name:o.name||null,done:false,urgent:false,emoji:o.emoji||(o.pid&&PRODUCTS[o.pid]?PRODUCTS[o.pid].emoji:guessEmoji(o.name||"",cat)),qty:o.qty||undefined}); }
  function oftenPacked(){

  function computeReminder(){
    const g={}; state.history.forEach(h=>{ const k=h.pid||((h.name||"").toLowerCase()); if(!k) return; (g[k]=g[k]||[]).push(h); });
    const day=86400000; let best=null;
    for(const k in g){ const a=g[k].slice().sort((x,y)=>x.ts-y.ts); if(a.length<2) continue;
      let gap=0; for(let i=1;i<a.length;i++) gap+=(a[i].ts-a[i-1].ts); const avg=gap/(a.length-1);
      const since=(Date.now()-a[a.length-1].ts); if(since<avg*0.8) continue;
      const last=a[a.length-1];
      const inShop=state.items.some(i=>i.area==="SHOP"&&(last.pid?i.pid===last.pid:((i.name||"").toLowerCase()===k)));
      if(inShop) continue; if(state.dismissed.includes(k)) continue;
      const overdue=since-avg; if(!best||overdue>best.overdue) best={key:k,pid:last.pid,name:last.name,emoji:last.emoji,days:Math.max(1,Math.round(avg/day)),overdue:overdue};
    }
    return best;
  }

  $("moreBtn").onclick=()=>{ renderMore(); $("moremenu").classList.add("show"); };
  $("moremenu").onclick=e=>{ if(e.target.id==="moremenu") $("moremenu").classList.remove("show"); };
  $("share").onclick=e=>{ if(e.target.id==="share") $("share").classList.remove("show"); };
  $("copyBtn").onclick=()=>{ const ta=$("sharebox"); ta.select(); let ok=false; try{ ok=document.execCommand("copy"); }catch(e){} try{ if(navigator.clipboard) navigator.clipboard.writeText(ta.value); ok=true; }catch(e){} $("copyBtn").textContent="✓ "+t().copied; setTimeout(()=>{ $("copyBtn").textContent="📋 "+t().copy; },1500); };
  document.querySelectorAll(".backbtn").forEach(b=>{ b.onclick=()=>{ const id=b.getAttribute("data-close"); $(id).classList.remove("show"); }; });
  $("history").onclick=e=>{ if(e.target.id==="history") $("history").classList.remove("show"); };
  $("usersBtn").onclick=()=>{ renderConnect(); $("invite").classList.add("show"); };
  $("invite").onclick=e=>{ if(e.target.id==="invite") $("invite").classList.remove("show"); };
  function showOnboarding(){
    const tr=t(); $("obWelcome").textContent=tr.obWelcome; $("obSub").textContent=tr.obSub; $("obStartBtn").textContent=tr.obStart;
    { const tb=document.getElementById("obTestBanner"); if(tb) tb.textContent="⚠ "+tr.testBanner; }
    const list=$("obList"); list.innerHTML="";
    [["🤝",tr.ob1],["🔄",tr.ob2],["🧳",tr.ob3],["😌",tr.ob4]].forEach(o=>{ const r=document.createElement("div"); r.style.cssText="display:flex;align-items:center;gap:12px;background:var(--bg);border-radius:13px;padding:12px 14px;margin-bottom:9px;";
      r.innerHTML='<span style="font-size:22px;">'+o[0]+'</span><span style="color:var(--ink);font-weight:700;font-size:14px;">'+o[1]+'</span>'; list.appendChild(r); });
    $("onboard").classList.add("show");
  }
  function maybeOnboard(){ if(!state.onboarded) setTimeout(showOnboarding,300); }
  function renderConnect(){
    const tr=t(); const box=$("connectBody"); box.innerHTML="";
    const title=document.createElement("h3"); title.textContent="🔗 "+tr.connectTitle; box.appendChild(title);
    if(state.household){
      const p=document.createElement("p"); p.innerHTML='<span style="color:#6FBF92;font-weight:800;">● '+tr.connected+'</span>'; box.appendChild(p);
      const code=document.createElement("div"); code.className="code"; code.textContent=state.household; box.appendChild(code);
      const cp=document.createElement("button"); cp.className="reset tap"; cp.style.cssText="color:#fff;background:var(--accent);border:none;margin-bottom:8px;"; cp.textContent="📋 "+tr.copyCode;
      cp.onclick=()=>{ const txt=state.household; const done=()=>{ cp.textContent="✓ "+tr.codeCopied; setTimeout(()=>{ cp.textContent="📋 "+tr.copyCode; },1200); }; if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(done).catch(done); } else { done(); } };
      box.appendChild(cp);
      const note=document.createElement("div"); note.style.cssText="font-size:11px;color:var(--inkSoft);text-align:center;margin:2px 0 14px;"; note.textContent=tr.sharedNote; box.appendChild(note);
      const dc=document.createElement("button"); dc.className="reset tap"; dc.textContent=tr.disconnect; dc.onclick=()=>{ disconnectHousehold(); renderConnect(); }; box.appendChild(dc);
    } else {
      const p=document.createElement("p"); p.textContent=tr.connectDesc; box.appendChild(p);
      const inp=document.createElement("input"); inp.id="hhcode"; inp.placeholder=tr.connectPh; inp.style.cssText="width:100%;border:none;outline:none;background:var(--bg);border-radius:12px;padding:12px 14px;font-size:15px;color:var(--ink);font-family:inherit;text-transform:uppercase;margin-bottom:10px;box-sizing:border-box;";
      box.appendChild(inp);
      const btn=document.createElement("button"); btn.className="reset tap"; btn.style.cssText="color:#fff;background:var(--accent);border:none;"; btn.textContent=tr.connectBtn;
      btn.onclick=async()=>{ const c=inp.value.trim(); if(!c) return; btn.disabled=true; await connectHousehold(c); renderConnect(); };
      box.appendChild(btn);
      const gen=document.createElement("button"); gen.className="reset tap"; gen.style.cssText="border:1px dashed rgba(150,160,160,.5);background:transparent;color:var(--inkSoft);margin-top:8px;"; gen.textContent="✨ "+tr.createCode;
      gen.onclick=async()=>{ gen.disabled=true; await connectHousehold(makeCode()); renderConnect(); };
      box.appendChild(gen);
      const note=document.createElement("div"); note.style.cssText="font-size:11px;color:var(--inkSoft);text-align:center;margin-top:10px;"; note.textContent=tr.sharedNote; box.appendChild(note);
    }
    // Familie / Personen
    const wt=document.createElement("div"); wt.className="day-head"; wt.textContent="👨‍👩‍👧 "+tr.famTitle; box.appendChild(wt);
    state.members.forEach(mem=>{
      const r=document.createElement("div"); r.style.cssText="display:flex;align-items:center;gap:9px;margin-bottom:8px;";
      const dot=document.createElement("button"); dot.className="tap"; dot.title="Emoji"; dot.style.cssText="width:30px;height:30px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;border:none;cursor:pointer;background:"+(mem.color||"#888")+";"; dot.textContent=mem.emoji||initialOf(mem);
      const cyc=["👨","👩","🧑","👦","👧","👶","🧒","🐶"]; dot.onclick=()=>{ const i=cyc.indexOf(mem.emoji); mem.emoji=cyc[(i+1)%cyc.length]; dot.textContent=mem.emoji; commit(); };
      const ni=document.createElement("input"); ni.value=mem.name||""; ni.maxLength=14; ni.style.cssText="flex:1;border:none;outline:none;background:var(--bg);border-radius:12px;padding:10px 12px;font-size:14px;color:var(--ink);font-family:inherit;box-sizing:border-box;";
      ni.addEventListener("input",()=>{ mem.name=ni.value; if(!mem.emoji) dot.textContent=initialOf(mem); });
      ni.addEventListener("change",()=>{ commit(); });
      r.appendChild(dot); r.appendChild(ni);
      if(state.members.length>1){ const del=document.createElement("button"); del.className="tap"; del.textContent="✕"; del.style.cssText="flex:0 0 auto;border:none;background:transparent;color:var(--inkSoft);font-size:16px;cursor:pointer;padding:4px 6px;"; del.onclick=()=>{ state.items.forEach(it=>{ if(it.assignee===mem.id) it.assignee=null; }); state.members=state.members.filter(x=>x.id!==mem.id); commit(); renderConnect(); }; r.appendChild(del); }
      box.appendChild(r);
    });
    // Rollen-Vorlagen
    const roles=[{n:"Papa",e:"👨",c:"#E0863C"},{n:"Mama",e:"👩",c:"#8267D8"},{n:"Kind",e:"🧒",c:"#3FA8C0"},{n:"Baby",e:"👶",c:"#E08AB0"},{n:"Oma/Opa",e:"🧓",c:"#69A85C"}];
    const palette=["#E0863C","#8267D8","#3FA8C0","#E08AB0","#69A85C","#C0654E","#5C7CE0","#C99A2E"];
    const rc=document.createElement("div"); rc.className="chips"; rc.style.marginBottom="6px";
    roles.forEach(role=>{ const c=document.createElement("button"); c.className="chip tap"; c.textContent=role.e+" "+role.n; c.onclick=()=>{ const id="m"+uid(); const used=state.members.map(m=>m.color); const col=role.c&&!used.includes(role.c)?role.c:palette.find(p=>!used.includes(p))||palette[state.members.length%palette.length]; state.members.push({id:id,name:role.n,emoji:role.e,color:col}); commit(); renderConnect(); }; rc.appendChild(c); });
    box.appendChild(rc);
    const addBtn=document.createElement("button"); addBtn.className="tap"; addBtn.style.cssText="width:100%;border:1px dashed rgba(150,160,160,.5);background:transparent;color:var(--inkSoft);border-radius:12px;padding:10px 0;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;margin-bottom:4px;"; addBtn.textContent="＋ "+tr.addPerson;
    addBtn.onclick=()=>{ const id="m"+uid(); const used=state.members.map(m=>m.color); const col=palette.find(p=>!used.includes(p))||palette[state.members.length%palette.length]; state.members.push({id:id,name:"",emoji:"",color:col}); commit(); renderConnect(); };
    box.appendChild(addBtn);
    const wh=document.createElement("div"); wh.style.cssText="font-size:11px;color:var(--inkSoft);margin-top:4px;"; wh.textContent=tr.whoHint; box.appendChild(wh);
    // Info: Was diese App alles kann (ehrlich, keine leeren Versprechen)
    const pt=document.createElement("div"); pt.className="day-head"; pt.style.marginTop="18px"; pt.textContent="ℹ️ "+tr.infoTitle; box.appendChild(pt);
    [["🛒🧳🏠",tr.if1],["🔄",tr.if2],["✨",tr.if3],["🚗",tr.if4],["👨‍👩‍👧",tr.if5],["📊",tr.if6],["♻️",tr.if7]].forEach(pr=>{ const c=document.createElement("div"); c.style.cssText="display:flex;align-items:flex-start;gap:10px;background:var(--bg);border-radius:12px;padding:11px 12px;margin-bottom:7px;";
      c.innerHTML='<span style="font-size:16px;flex:0 0 auto;line-height:1.3;">'+pr[0]+'</span><span style="flex:1;color:var(--ink);font-weight:600;font-size:13px;line-height:1.35;">'+pr[1]+'</span><span style="font-size:13px;color:#6FBF92;flex:0 0 auto;">✓</span>'; box.appendChild(c); });
    const ff=document.createElement("div"); ff.style.cssText="font-size:11.5px;color:var(--inkSoft);text-align:center;margin-top:8px;line-height:1.4;"; ff.textContent=tr.infoFooter; box.appendChild(ff);
  }
  $("resetBtn").onclick=()=>{ if(!confirm(t().resetConfirm)) return; state.items=seed(); state.history=seedHistory(); state.dismissed=[]; state.learned={SHOP:{},PACK:{}}; state.addingCat=null; state.customCats={SHOP:[],PACK:[],TODO:[]}; state.customProducts={SHOP:[],PACK:[]}; state.addingNewCat=false; state.lastTrip=null; state.hideDone={SHOP:false,PACK:false,TODO:false}; state.view={SHOP:"list",PACK:"list",TODO:"list"}; state.members=[{id:"m1",name:"Ich",color:"#E0863C"},{id:"m2",name:"Partner",color:"#8267D8"}]; state.trips=[]; commit(); $("invite").classList.remove("show"); };
  $("bellBtn").onclick=()=>{ renderPush(); $("push").classList.add("show"); };
  $("obStartBtn").onclick=()=>{ state.onboarded=true; savePrefs(); $("onboard").classList.remove("show"); };
  $("onboard").onclick=e=>{ if(e.target.id==="onboard"){ state.onboarded=true; savePrefs(); $("onboard").classList.remove("show"); } };
  $("pushClose").onclick=()=>$("push").classList.remove("show");
  $("push").onclick=e=>{ if(e.target.id==="push") $("push").classList.remove("show"); };

  (async()=>{
    const prefs=await loadPrefs();
    if(prefs){ state.lang=prefs.lang||deviceLang(); state.theme=prefs.theme||"light"; if(prefs.viewVersion===3 && prefs.view && typeof prefs.view==="object"){ state.view={SHOP:(prefs.view.SHOP==="tiles"?"tiles":"list"),PACK:(prefs.view.PACK==="tiles"?"tiles":"list"),TODO:(prefs.view.TODO==="tiles"?"tiles":"list")}; } const hd=prefs.hideDone||{}; state.hideDone={SHOP:!!hd.SHOP,PACK:!!hd.PACK,TODO:!!hd.TODO}; state.household=prefs.household||null; state.onboarded=!!prefs.onboarded; if(prefs.activeTrip) state.activeTrip=prefs.activeTrip; }
    if(state.household){
      const c=await fetchShared(state.household);
      if(c && c.items){ state.syncTs=c._ts||0; applyContent(c); }
      else { state.items=seed(); state.history=seedHistory(); await saveContent(); }
      startPolling(); startRealtime();
    } else {
      const data=await loadLegacy();
      if(data&&Array.isArray(data)){ state.items=data; state.history=seedHistory(); }
      else if(data&&data.items){ applyContent(data); if(data.lang&&!prefs){ state.lang=data.lang||deviceLang(); state.theme=data.theme||"light"; } }
      else { state.items=seed(); state.history=seedHistory(); }
    }
    state.items.forEach(i=>{ if(!i.emoji) i.emoji=i.pid&&PRODUCTS[i.pid]?PRODUCTS[i.pid].emoji:guessEmoji(i.name||"",i.category); });
    if(state.lastTrip){ const lt=state.lastTrip; if(lt.types) genState.types=lt.types.slice(); if(lt.duration) genState.duration=lt.duration; genState.location=lt.location||""; genState.dateFrom=lt.dateFrom||""; genState.dateTo=lt.dateTo||""; genState.travelers=lt.travelers||2; }
    normalizeMemberColors();
    ensureTrips(); loadGenFromTrip(activeTripObj());
    _id=state.items.reduce((m,i)=>Math.max(m,i.id),100); updateSyncDot(); render(); maybeOnboard();
  })();
  if("serviceWorker" in navigator){ window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); }); }
</script>
